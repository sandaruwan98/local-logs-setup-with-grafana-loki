server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            severity: severity
            service: 'context.service'
            logger: logger
            message: message
            thread: thread
            instance: 'context.instance'
            version: 'context.version'
            correlationId: 'context.correlationId'
      - labels:
          severity:
          service:
      - template:
          source: log_line
          template: '{"logger":"{{.logger}}","message":"{{.message}}","thread":"{{.thread}}","instance":"{{.instance}}","version":"{{.version}}"{{if .correlationId}},"correlationId":"{{.correlationId}}"{{end}}}'
      - output:
          source: log_line
